<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Europe Summer 2026 — Trip Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06060f;--card2:#111125;--pink:#f72585;--purple:#7209b7;--blue:#4cc9f0;--orange:#e07c24;--green:#52b788;--text:#fff;--muted:#ffffff88;--dim:#ffffff44;--subtle:#ffffff11}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased}
.hero{text-align:center;padding:48px 20px 32px;background:linear-gradient(180deg,#0f0c29 0%,#1a1040 50%,var(--bg) 100%);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(247,37,133,.12) 0%,transparent 60%)}
.hero-tag,.hero h1,.hero-sub,.hero-sub2,.tabs,.countdown{position:relative}
.hero-tag{font-size:11px;color:var(--pink);font-weight:700;letter-spacing:4px;text-transform:uppercase;margin-bottom:10px}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(30px,6vw,48px);font-weight:900;background:linear-gradient(135deg,#f72585,#b5179e,#7209b7,#4cc9f0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.15;margin-bottom:12px}
.hero-sub{color:var(--muted);font-size:14px}.hero-sub2{color:var(--dim);font-size:12px;margin-top:4px}
.tabs{display:flex;justify-content:center;gap:8px;margin-top:22px;flex-wrap:wrap}
.tab{padding:9px 22px;border-radius:24px;border:none;font-size:12px;font-weight:700;cursor:pointer;transition:all .25s;font-family:inherit}
.tab.active{background:linear-gradient(135deg,#f72585,#7209b7);color:#fff;box-shadow:0 4px 20px rgba(247,37,133,.3)}
.tab:not(.active){background:#ffffff0a;color:var(--muted);border:1px solid #ffffff15}
.tab:not(.active):hover{background:#ffffff15;color:#fff}
.container{max-width:700px;margin:0 auto;padding:20px 16px 60px}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:8px;flex-wrap:wrap}
.toolbar button{background:none;border:1px solid #ffffff18;color:var(--dim);font-size:11px;padding:6px 14px;border-radius:10px;cursor:pointer;font-family:inherit;transition:.2s}
.toolbar button:hover{border-color:#ffffff44;color:#fff}
.search-box{flex:1;min-width:140px;max-width:260px;padding:8px 14px;border-radius:12px;border:1px solid #ffffff15;background:#ffffff08;color:#fff;font-size:12px;font-family:inherit;outline:none;transition:.2s}
.search-box:focus{border-color:var(--pink)}
.search-box::placeholder{color:var(--dim)}
.progress-strip{display:flex;gap:2px;margin-bottom:20px}.progress-dot{flex:1;height:4px;border-radius:2px}
.stop{background:var(--card2);border:1px solid var(--subtle);border-radius:18px;margin-bottom:14px;overflow:hidden;transition:.3s}
.stop:hover{border-color:#ffffff22}.stop.family{background:#0a0a18;border-style:dashed}
.stop-header{display:flex;align-items:center;gap:14px;padding:16px 18px;cursor:pointer;user-select:none}
.stop-icon{width:54px;height:54px;border-radius:14px;flex-shrink:0;border:2px solid #ffffff18;display:flex;align-items:center;justify-content:center;font-size:28px}
.chevron{color:var(--dim);font-size:22px;transition:transform .25s;flex-shrink:0}.chevron.open{transform:rotate(180deg)}
.stop-body{padding:0 18px 18px;border-top:1px solid #ffffff08}
.photo-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.photo-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;background:#ffffff08;border:1px solid #ffffff15;border-radius:20px;color:var(--blue);font-size:11px;font-weight:600;text-decoration:none;transition:.2s;white-space:nowrap}
.photo-pill:hover{background:#ffffff15;border-color:var(--blue);transform:translateY(-1px)}
.countdown{display:inline-flex;align-items:center;gap:8px;margin-top:12px;padding:8px 18px;background:#ffffff0a;border:1px solid #ffffff15;border-radius:12px;font-size:12px;color:var(--muted)}
.countdown .cd-num{color:var(--pink);font-weight:700;font-size:16px}
.must-do{margin-top:12px;padding:10px 14px;background:linear-gradient(135deg,rgba(247,37,133,.08),rgba(114,9,183,.08));border:1px solid rgba(247,37,133,.2);border-radius:12px}
.must-do-label{font-size:10px;color:var(--pink);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.must-do-text{font-size:12.5px;color:#ffffffdd;line-height:1.5}
.perday{color:var(--green);font-size:10px;font-weight:600;margin-left:6px}
.transport{background:#0a0a1a;border-radius:13px;padding:13px 15px;margin-top:13px;border-left:3px solid var(--pink)}
.sec-tabs{display:flex;gap:6px;margin-bottom:12px;margin-top:14px;flex-wrap:wrap}
.sec-tab{padding:6px 16px;border-radius:20px;border:none;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s}
.si{display:flex;gap:8px;margin-bottom:7px;font-size:12.5px;color:#ffffffcc;line-height:1.55}
.si .b{color:#ffffff33;flex-shrink:0}
.weather{margin-top:10px;font-size:11px;color:var(--muted);background:#ffffff08;padding:6px 12px;border-radius:8px;display:inline-block}
.hostel{margin-top:12px;font-size:12px;color:var(--muted);background:#ffffff06;padding:9px 13px;border-radius:10px}
.bchips{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.bchip{background:#0a0a18;border-radius:8px;padding:6px 11px;font-size:11px;color:var(--muted)}
.daytrip{margin-top:14px;background:linear-gradient(135deg,#1a0a2e,#16213e);border-radius:13px;border:1px solid rgba(247,37,133,.2);overflow:hidden}
.daytrip-hd{padding:12px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.daytrip-hd span:first-child{font-size:13px;font-weight:700;color:var(--pink)}
.dti{display:flex;gap:8px;margin-bottom:5px;font-size:12px;color:#ffffffcc;line-height:1.5}
.sched-wrap{margin-top:14px}
.sched-label{font-size:11px;color:var(--orange);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.sched-day{background:#0a0a1a;border-radius:12px;margin-bottom:8px;overflow:hidden;border:1px solid #ffffff08}
.sched-day-hd{padding:10px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.sched-day-hd .sd-title{font-size:12px;font-weight:700;color:var(--purple)}
.sched-day-hd .sd-sub{font-size:10px;color:var(--dim);margin-left:8px;font-weight:400}
.sched-day-hd .sd-chev{color:var(--dim);font-size:14px;transition:transform .2s}
.sched-day-hd .sd-chev.sdo{transform:rotate(180deg)}
.sched-day-body{padding:0 14px 12px}
.sched-item{font-size:11.5px;color:#ffffffbb;line-height:1.65;margin-bottom:2px;padding-left:2px}
.budget-card{background:var(--card2);border-radius:16px;padding:22px 24px;margin-bottom:20px}
.bar-track{background:#1a1a35;border-radius:10px;height:22px;overflow:hidden;margin:14px 0}
.bar-fill{height:100%;background:linear-gradient(90deg,#f72585,#7209b7,#3a0ca3);border-radius:10px;transition:width .8s}
.sbrow{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--card2);border-radius:12px;margin-bottom:8px;font-size:13px}
.packing{background:var(--card2);border-radius:16px;padding:20px}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pitem{font-size:12px;color:var(--muted);padding:6px 10px;background:#ffffff06;border-radius:8px;cursor:pointer;transition:.2s;user-select:none}
.pitem.chk{text-decoration:line-through;color:var(--dim);background:#ffffff03}.pitem:hover{background:#ffffff0a}
.map-wrap{background:var(--card2);border-radius:16px;padding:20px;overflow:hidden}
.map-legend{display:flex;gap:16px;justify-content:center;margin-top:14px;font-size:11px;color:var(--muted);flex-wrap:wrap}
.tl-stop{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid #ffffff08;cursor:pointer;transition:.15s}
.tl-stop:hover{background:#ffffff04;margin:0 -12px;padding:14px 12px;border-radius:10px}
.tl-dot{width:12px;height:12px;border-radius:6px;flex-shrink:0;margin-top:4px;border:2px solid #ffffff33}
.tl-line{width:2px;background:#ffffff15;margin:2px 5px}
.leaflet-popup-content-wrapper{background:#111125!important;color:#fff!important;border-radius:12px!important;box-shadow:0 8px 32px rgba(0,0,0,.5)!important}
.leaflet-popup-tip{background:#111125!important}
.leaflet-popup-content{font-family:'DM Sans',sans-serif!important;font-size:13px!important;margin:12px 14px!important}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#ffffff22;border-radius:3px}
@media(max-width:480px){.pgrid{grid-template-columns:1fr}.hero h1{font-size:28px}}
</style>
</head>

function cd() {

  if (d <= 0) { e.innerHTML = "🎉 <b>Trip underway!</b>"; return; }

cd();
setInterval(cd, 60000);

function togS(i) { openS.has(i) ? openS.delete(i) : openS.add(i); go(); }
function expAll() { STOPS.forEach(s => openS.add(s.id)); go(); }
function colAll() { openS.clear(); go(); }
function sTab(i, t) { tabs[i] = t; go(); }
function togDT(i) { openDT.has(i) ? openDT.delete(i) : openDT.add(i); go(); }
function togDay(key) { openDays.has(key) ? openDays.delete(key) : openDays.add(key); go(); }
function togP(i) { chkP.has(i) ? chkP.delete(i) : chkP.add(i); go(); }
function onSrch(e) { search = e.target.value.toLowerCase(); go(); }

function go() {
  const a = document.getElementById("app");
  if (V === "itinerary") rItin(a);
  else if (V === "timeline") rTL(a);
  else if (V === "map") rMap(a);
  else if (V === "budget") rBud(a);
  else rPk(a);
}

function rItin(el) {
  const f = STOPS.filter(s => !search || [s.city, s.tagline, ...(s.activities||[]), ...(s.eats||[]), MUST_DO[s.id]||""].join(" ").toLowerCase().includes(search));
  el.innerHTML = `
    <div class="progress-strip">${STOPS.map(s=>`<div class="progress-dot" style="background:${s.phase==="dad"?"#52b788":s.phase==="mom"?"#4cc9f0":"#f72585"}"></div>`).join("")}</div>
    <div style="display:flex;gap:6px;margin-bottom:8px;font-size:10px;justify-content:center;color:var(--muted)">
      <span style="color:#52b788">■ Dad</span><span style="color:#f72585;margin-left:8px">■ Solo</span><span style="color:#4cc9f0;margin-left:8px">■ Mom</span>
    </div>
    <div class="toolbar">
      <button onclick="expAll()">Expand all</button>
      <input class="search-box" placeholder="Search cities, food, activities..." value="${search}" oninput="onSrch(event)">
      <button onclick="colAll()">Collapse all</button>
    </div>
    ${f.map(rS).join("")}
    <div style="margin-top:30px;padding:18px;background:var(--card2);border-radius:14px;font-size:12px;color:var(--dim);line-height:1.8;text-align:center">
      <strong style="color:var(--pink)">⚡</strong> Trainline · Seat61 · Omio · FlixBus · Ryanair · Hostelworld · Eurail · b-europe.com
    </div>`;
}

function rS(s) {
  const o = openS.has(s.id), f = s.phase !== "solo", t = tabs[s.id] || "do";
  const pd = s.budget > 0 ? Math.round(s.budget / s.days) : 0;
  let b = "";

  if (o) {
    const n = s.notes && !s.activities?.length ? `<p style="color:var(--muted);font-size:13px;font-style:italic;margin:14px 0 0">${s.notes}</p>` : "";
    const md = MUST_DO[s.id];
    const mh = md ? `<div class="must-do"><div class="must-do-label">🔥 Don't Miss</div><div class="must-do-text">${md}</div></div>` : "";
    const ph = PHOTO_LABELS[s.id] || [];
    const c = ph.length ? `<div style="margin-top:12px"><div style="font-size:11px;color:var(--pink);font-weight:700;margin-bottom:8px">📸 SEE PHOTOS</div><div class="photo-grid">${ph.map(p=>`<a class="photo-pill" href="https://www.google.com/search?udm=2&q=${encodeURIComponent(p)}" target="_blank" rel="noopener">🖼 ${p}</a>`).join("")}</div></div>` : "";
    const w = s.weather ? `<div class="weather">${s.weather}</div>` : "";
    const tr = s.transport ? `<div class="transport"><div style="font-size:11px;color:var(--pink);font-weight:700;margin-bottom:5px">🚆 FROM ${s.transport.from}</div><div style="font-size:13px;color:#fff;font-weight:600">${s.transport.method}</div><div style="font-size:12px;color:var(--muted);margin-top:3px">⏱ ${s.transport.time} · 💵 ${s.transport.cost}</div><div style="font-size:11px;color:var(--blue);margin-top:5px">💡 ${s.transport.tip}</div></div>` : "";

    let st = "";
    if (s.activities?.length) {
      const tc = {do:"#7209b7",eat:"#e07c24",night:"#3a0ca3"};
      const tl = {do:"⚡ Do",eat:"🍽 Eat",night:"🌙 Night"};
      const tt = {do:"THINGS TO DO",eat:"WHERE TO EAT",night:"NIGHTLIFE"};
      const ti = {do:"⚡",eat:"🍽",night:"🌙"};
      const items = t==="do" ? s.activities : t==="eat" ? s.eats : s.nightlife;
      st = `<div class="sec-tabs">${["do","eat","night"].map(k=>`<button class="sec-tab" style="background:${t===k?tc[k]:"#ffffff0a"};color:${t===k?"#fff":"var(--dim)"}" onclick="sTab(${s.id},'${k}')">${tl[k]}</button>`).join("")}</div>
        <div style="font-size:11px;font-weight:700;margin-bottom:8px;color:${tc[t]}">${ti[t]} ${tt[t]}</div>
        ${(items||[]).map(a=>`<div class="si"><span class="b">›</span><span>${a}</span></div>`).join("")}`;
    }

    let dt = "";
    if (s.dayTrip) {
      const dp = openDT.has(s.id);
      dt = `<div class="daytrip"><div class="daytrip-hd" onclick="togDT(${s.id})"><span>${s.dayTrip.name}</span><span style="color:var(--dim);font-size:16px;display:inline-block;transform:${dp?"rotate(180deg)":""};transition:.2s">▾</span></div>${dp?`<div style="padding:0 14px 14px"><p style="font-size:12px;color:#ffffffaa;line-height:1.6;margin:0 0 10px">${s.dayTrip.desc}</p>${s.dayTrip.activities.map(a=>`<div class="dti"><span style="color:rgba(247,37,133,.5)">★</span><span>${a}</span></div>`).join("")}<div style="margin-top:10px;font-size:11px;color:var(--blue)">💵 ${s.dayTrip.cost}</div><div style="font-size:11px;color:var(--muted);margin-top:4px">💡 ${s.dayTrip.tip}</div></div>`:""}</div>`;
    }

    let sched = "";
    if (s.daily && s.daily.length) {
      sched = `<div class="sched-wrap"><div class="sched-label">📅 Daily Schedule</div>${s.daily.map((d,di) => {
        const key = s.id + "-" + di;
        const isOpen = openDays.has(key);
        return `<div class="sched-day">
          <div class="sched-day-hd" onclick="togDay('${key}')">
            <div><span class="sd-title">${d.day}</span><span class="sd-sub">${d.title}</span></div>
            <span class="sd-chev${isOpen?" sdo":""}">▾</span>
          </div>
          ${isOpen ? `<div class="sched-day-body">${d.items.map(item => `<div class="sched-item">${item}</div>`).join("")}</div>` : ""}
        </div>`;
      }).join("")}</div>`;
    }

    const hs = s.hostelRec ? `<div class="hostel">${s.hostelRec}</div>` : "";
    const bc = s.budgetBreakdown ? `<div class="bchips">${Object.entries(s.budgetBreakdown).map(([k,v])=>`<div class="bchip">${{hostel:"🛏",food:"🍽",transport:"🚄",activities:"🎟"}[k]} $${v}</div>`).join("")}</div>` : "";
    const nb = s.notes && s.activities?.length ? `<p style="color:var(--dim);font-size:11px;margin-top:10px;font-style:italic">📌 ${s.notes}</p>` : "";

    b = `<div class="stop-body">${n}${mh}${c}${w}${tr}${st}${dt}${sched}${hs}${bc}${nb}</div>`;
  }

  return `<div class="stop${f?" family":""}">
    <div class="stop-header" onclick="togS(${s.id})">
      <div class="stop-icon" style="background:${s.grad}">${s.emoji}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span style="font-size:17px;font-weight:700">${s.city}</span>
          <span style="font-size:12px;color:var(--dim)">${s.country}</span>
          ${f?`<span style="font-size:10px;background:rgba(247,37,133,.12);color:var(--pink);padding:2px 9px;border-radius:20px;font-weight:600">with ${s.phase==="dad"?"Dad":"Mom"}</span>`:""}
        </div>
        <div style="font-size:12px;color:var(--muted);margin-top:3px">${s.dates} · ${s.days}d${s.budget>0?`<span style="color:var(--blue);margin-left:8px;font-weight:600">~$${s.budget}</span><span class="perday">($${pd}/day)</span>`:""}</div>
        <div style="font-size:11px;color:var(--dim);margin-top:2px">${s.tagline}</div>
      </div>
      <span class="chevron${o?" open":""}">▾</span>
    </div>${b}
  </div>`;
}

function rTL(el) {
  const cols = {dad:"#52b788",mom:"#4cc9f0",solo:"#f72585"};
  const td = STOPS.reduce((a,s) => a + s.days, 0);
  let dc = 0;
  const sd = STOPS.filter(s=>s.phase==="solo").reduce((a,s)=>a+s.days,0);
  el.innerHTML = `
    <div style="margin-bottom:20px">
      <div style="font-size:15px;font-weight:700;margin-bottom:6px">📅 Timeline</div>
      <div style="font-size:12px;color:var(--muted)">${td}-day journey. Click any stop.</div>
    </div>
    <div style="display:flex;height:28px;border-radius:10px;overflow:hidden;margin-bottom:24px;gap:1px">
      ${STOPS.map(s=>`<div style="width:${s.days/td*100}%;background:${cols[s.phase]};display:flex;align-items:center;justify-content:center;font-size:${s.days>2?11:8}px;color:#fff;font-weight:600;cursor:pointer" onclick="sw('itinerary');openS.add(${s.id});go()" title="${s.city} (${s.days}d)">${s.days>1?s.emoji:""}</div>`).join("")}
    </div>
    <div style="display:flex;gap:6px;margin-bottom:20px;font-size:10px;justify-content:center;color:var(--muted)">
      <span style="color:#52b788">■ Dad 9d</span><span style="color:#f72585;margin-left:8px">■ Solo 44d</span><span style="color:#4cc9f0;margin-left:8px">■ Mom 8d</span>
    </div>
    ${STOPS.map((s,i) => {
      dc += s.days;
      const start = dc - s.days + 1;
      const md = MUST_DO[s.id] || "";
      const ppd = s.budget > 0 ? Math.round(s.budget/s.days) : 0;
      return `<div class="tl-stop" onclick="sw('itinerary');openS.add(${s.id});go()">
        <div style="display:flex;flex-direction:column;align-items:center;min-width:28px">
          <div class="tl-dot" style="background:${cols[s.phase]};border-color:${cols[s.phase]}"></div>
          ${i < STOPS.length-1 ? '<div class="tl-line" style="flex:1"></div>' : ""}
        </div>
        <div style="flex:1;padding-bottom:4px">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span style="font-size:15px;font-weight:700">${s.emoji} ${s.city}</span>
            <span style="font-size:11px;color:var(--dim)">${s.country}</span>
            ${s.phase!=="solo"?`<span style="font-size:9px;background:rgba(247,37,133,.12);color:var(--pink);padding:2px 7px;border-radius:12px;font-weight:600">with ${s.phase==="dad"?"Dad":"Mom"}</span>`:""}
          </div>
          <div style="font-size:11px;color:var(--muted);margin-top:3px">
            ${s.dates} · ${s.days}d · Day ${start}${s.days>1?"-"+dc:""} of ${td}
            ${s.budget>0?` · <span style="color:var(--blue);font-weight:600">$${s.budget}</span> <span style="color:var(--green);font-size:10px">($${ppd}/d)</span>`:""}
          </div>
          ${md?`<div style="font-size:11px;color:var(--pink);margin-top:4px;opacity:.8">🔥 ${md}</div>`:""}
          ${s.transport?`<div style="font-size:10px;color:var(--dim);margin-top:3px">↗ ${s.transport.method} · ${s.transport.time}</div>`:""}
        </div>
      </div>`;
    }).join("")}
    <div style="margin-top:20px;padding:16px;background:var(--card2);border-radius:14px;text-align:center">
      <div style="font-size:13px;color:var(--muted)"><span style="color:#fff;font-weight:700">${td} days</span> · <span style="color:#fff;font-weight:700">15 countries</span></div>
      <div style="font-size:12px;color:var(--dim);margin-top:4px">Solo: <span style="color:var(--blue);font-weight:700">$${TOTAL}</span> · <span style="color:var(--green);font-weight:600">$${Math.round(TOTAL/sd)}/day avg</span></div>
    </div>`;
}

let leafletLoaded = false, mapI = null;
function loadLeaflet(cb) {
  if (leafletLoaded) { cb(); return; }
  const l = document.createElement("link"); l.rel = "stylesheet"; l.href = "https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"; document.head.appendChild(l);
  const s = document.createElement("script"); s.src = "https://unpkg.com/leaflet@1.9.4/dist/leaflet.js";
  s.onload = () => { leafletLoaded = true; cb(); };
  s.onerror = () => { const e = document.getElementById("mL"); if(e) e.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:12px;color:var(--muted)"><div style="font-size:36px">🗺️</div><a href="https://www.google.com/maps/dir/Munich/Prague/Brussels/Paris/San+Sebastian/Porto/Lisbon/Lagos+Portugal/Seville/Barcelona/Marseille/Riomaggiore/Lake+Como/Rome/Naples/Athens/Chania/Saranda/Kotor/Dubrovnik/Split/Ljubljana/Budapest/Vienna" target="_blank" style="color:var(--blue)">Open in Google Maps →</a></div>'; };
  document.head.appendChild(s);
}

function rMap(el) {
  el.innerHTML = `<div class="map-wrap">
    <div style="font-size:15px;font-weight:700;margin-bottom:14px">🗺 Route</div>
    <div id="mL" style="height:500px;border-radius:14px;overflow:hidden;background:#0a0a1a"></div>
    <div class="map-legend"><span>🟢 Dad</span><span>🔴 Solo</span><span>🔵 Mom</span></div>
    <div style="margin-top:12px;text-align:center">
      <a href="https://www.google.com/maps/dir/Munich/Prague/Brussels/Paris/San+Sebastian/Porto/Lisbon/Lagos+Portugal/Seville/Barcelona/Riomaggiore/Cortina/Lake+Como/Rome/Naples/Athens/Chania/Saranda/Kotor/Dubrovnik/Split/Ljubljana/Budapest/Vienna" target="_blank" style="color:var(--blue);font-size:12px;text-decoration:none;font-weight:600">🔗 Google Maps full route →</a>
    </div>
  </div>`;
}

function initMap() {
  if (mapI) { mapI.remove(); mapI = null; }
  const el = document.getElementById("mL");
  if (!el || !window.L) return;
  mapI = L.map(el, {center:[44,12],zoom:4,scrollWheelZoom:true});
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {attribution:"© OSM © CARTO",subdomains:"abcd",maxZoom:18}).addTo(mapI);
  const co = STOPS.map(s => [s.lat, s.lng]);
  L.polyline(co, {color:"#f72585",weight:3,opacity:.7,dashArray:"10 6"}).addTo(mapI);
  const cl = {dad:"#52b788",mom:"#4cc9f0",solo:"#f72585"};
  STOPS.forEach((s, i) => {
    const c = cl[s.phase], sz = s.days>5?36:s.days>2?30:26;
    const ic = L.divIcon({className:"",html:`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${c};border:2.5px solid #fff;display:flex;align-items:center;justify-content:center;font-size:${sz>30?15:12}px;box-shadow:0 3px 12px rgba(0,0,0,.5);cursor:pointer;position:relative">${s.emoji}<div style="position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;color:#fff;background:${c};padding:1px 6px;border-radius:8px;white-space:nowrap;font-family:DM Sans,sans-serif">${i+1}</div></div>`,iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
    const pd = s.budget > 0 ? Math.round(s.budget/s.days) : 0;
    L.marker([s.lat,s.lng],{icon:ic}).addTo(mapI).bindPopup(`<div style="min-width:200px;font-family:DM Sans,sans-serif"><b>${s.emoji} ${s.city}</b> ${s.country}<br><span style="color:#aaa;font-size:11px">${s.dates} · ${s.days}d</span><br><span style="color:#ccc;font-size:11px">${s.tagline}</span>${s.budget>0?`<br><span style="color:#4cc9f0;font-weight:700">~$${s.budget}</span> <span style="color:#52b788;font-size:10px">($${pd}/d)</span>`:""}</div>`,{maxWidth:280});
  });
  mapI.fitBounds(co, {padding:[30,30]});
  setTimeout(() => mapI.invalidateSize(), 100);
}

function rBud(el) {
  const sp = TOTAL, tot = 6000, pc = Math.round(sp/tot*100);
  const ct = {hostel:0,food:0,transport:0,activities:0};
  STOPS.forEach(s => { if(s.budgetBreakdown) Object.keys(ct).forEach(k => ct[k] += s.budgetBreakdown[k]); });
  const cc = {hostel:"#f72585",food:"#e07c24",transport:"#3a0ca3",activities:"#4cc9f0"};
  const cn = {hostel:"🛏 Hostels",food:"🍽 Food",transport:"🚄 Transport",activities:"🎟 Activities"};
  const cT = Object.values(ct).reduce((a,b) => a+b, 0);
  let ag = -90;
  const ar = Object.entries(ct).map(([k,v]) => {
    const p = v/cT, s = ag; ag += p*360;
    const r=70, cx=90, cy=90, sr=s*Math.PI/180, er=ag*Math.PI/180;
    return `<path d="M${cx},${cy} L${cx+r*Math.cos(sr)},${cy+r*Math.sin(sr)} A${r},${r} 0 ${p>.5?1:0},1 ${cx+r*Math.cos(er)},${cy+r*Math.sin(er)} Z" fill="${cc[k]}" opacity=".85"/>`;
  }).join("");
  const sd = STOPS.filter(s=>s.phase==="solo").reduce((a,s)=>a+s.days,0);
  el.innerHTML = `
    <div class="budget-card">
      <div style="display:flex;justify-content:space-between"><span style="font-weight:700;font-size:16px">💰 Budget</span><span style="color:var(--blue);font-weight:700;font-size:16px">$${tot-sp} left</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pc}%"></div></div>
      <div style="display:flex;justify-content:space-between;color:var(--muted);font-size:12px"><span>Solo: ~$${sp}</span><span>${pc}% of $6k</span></div>
      <div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:16px">
        ${Object.entries(ct).map(([k,v])=>`<div style="display:flex;align-items:center;gap:6px;font-size:12px;color:#ffffffbb"><div style="width:10px;height:10px;border-radius:3px;background:${cc[k]}"></div>${cn[k]}: $${v}</div>`).join("")}
      </div>
      <div style="display:flex;justify-content:center;margin-top:20px">
        <svg width="180" height="180" viewBox="0 0 180 180">${ar}<circle cx="90" cy="90" r="42" fill="#111125"/><text x="90" y="86" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">$${cT}</text><text x="90" y="102" text-anchor="middle" fill="#ffffff66" font-size="10">total solo</text></svg>
      </div>
      <div style="margin-top:10px;color:var(--dim);font-size:11px;font-style:italic">* Parent weeks $0. ~$${tot-sp} buffer for extras.</div>
    </div>
    <h3 style="font-size:15px;margin-bottom:12px;font-weight:700">Per stop</h3>
    ${STOPS.filter(s=>s.budget>0).map(s=>`<div class="sbrow"><span style="color:#ffffffcc">${s.emoji} ${s.city} <span style="color:var(--dim)">(${s.days}d)</span></span><span><span style="color:var(--blue);font-weight:700">$${s.budget}</span><span class="perday">$${Math.round(s.budget/s.days)}/d</span></span></div>`).join("")}
    <div style="margin-top:12px;padding:12px 16px;background:#ffffff08;border-radius:12px;display:flex;justify-content:space-between">
      <span style="font-size:12px;color:var(--muted)">Daily avg (solo)</span>
      <span style="font-size:14px;font-weight:700;color:var(--green)">$${Math.round(TOTAL/sd)}/day</span>
    </div>
    <div style="margin-top:18px;padding:18px;background:var(--card2);border-radius:14px;font-size:13px;color:var(--muted);line-height:1.9">
      <strong style="color:#fff">💡 Tips</strong><br>
      › Eurail on every eligible train<br>
      › Book TGV/Eurostar 3mo early<br>
      › FlixBus Balkans + overnights<br>
      › Ryanair carry-on only<br>
      › Cook 2-3 nights/week<br>
      › Albania & Hungary absurdly cheap<br>
      › €4 Vienna Opera standing<br>
      › Museums free under 18/25!
    </div>`;
}
